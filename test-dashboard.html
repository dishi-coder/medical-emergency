<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediCare - Data Test Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .header h1 {
            color: #333;
            margin-bottom: 10px;
        }

        .auth-status {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .status-badge {
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }

        .logged-in { background: #4ade80; color: white; }
        .logged-out { background: #f87171; color: white; }
        .role-patient { background: #60a5fa; color: white; }
        .role-doctor { background: #f59e0b; color: white; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .card h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 18px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }

        .stat {
            background: #f3f4f6;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        button {
            padding: 10px 15px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
        }

        .btn-success {
            background: #4ade80;
            color: white;
        }

        .btn-success:hover {
            background: #22c55e;
        }

        .btn-danger {
            background: #f87171;
            color: white;
        }

        .btn-danger:hover {
            background: #ef4444;
        }

        .table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        .table th {
            background: #f3f4f6;
            padding: 12px;
            text-align: left;
            font-weight: 600;
            color: #333;
            border-bottom: 2px solid #e5e7eb;
        }

        .table td {
            padding: 12px;
            border-bottom: 1px solid #e5e7eb;
            font-size: 14px;
        }

        .table tr:hover {
            background: #f9fafb;
        }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-active { background: #dcfce7; color: #166534; }
        .badge-resolved { background: #e0e7ff; color: #3730a3; }
        .badge-critical { background: #fee2e2; color: #991b1b; }
        .badge-high { background: #fef3c7; color: #92400e; }

        .message {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .message-success {
            background: #dcfce7;
            color: #166534;
            border-left: 4px solid #4ade80;
        }

        .message-info {
            background: #dbeafe;
            color: #1e40af;
            border-left: 4px solid #60a5fa;
        }

        .message-warning {
            background: #fef3c7;
            color: #92400e;
            border-left: 4px solid #facc15;
        }

        .empty {
            text-align: center;
            color: #999;
            padding: 20px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🏥 MediCare - Data Management Test Dashboard</h1>
            <div class="auth-status" id="auth-status"></div>
        </div>

        <!-- Main Grid -->
        <div class="grid">
            <!-- Authentication Card -->
            <div class="card">
                <h2>👤 Authentication</h2>
                <div id="auth-info"></div>
                <div class="button-group" style="margin-top: 15px;">
                    <button class="btn-primary" onclick="simulatePatientLogin()">Test Patient Login</button>
                    <button class="btn-primary" onclick="simulateDoctorLogin()">Test Doctor Login</button>
                    <button class="btn-success" onclick="simulatePatientRegister()">Test Patient Register</button>
                    <button class="btn-danger" onclick="Auth.logout()">Logout</button>
                </div>
            </div>

            <!-- Dashboard Stats Card -->
            <div class="card">
                <h2>📊 Dashboard Stats</h2>
                <div class="stats" id="stats-container"></div>
                <button class="btn-primary" onclick="updateStats()" style="width: 100%;">Refresh Stats</button>
            </div>

            <!-- Quick Actions Card -->
            <div class="card">
                <h2>⚡ Quick Actions</h2>
                <div class="button-group">
                    <button class="btn-success" onclick="logSamplePrediction()">Log AI Prediction</button>
                    <button class="btn-danger" onclick="logSampleEmergency()">Log Emergency Alert</button>
                    <button class="btn-primary" onclick="generateSampleData()">Generate Test Data</button>
                    <button class="btn-primary" onclick="viewAllStoredData()">View All Data (Console)</button>
                </div>
            </div>
        </div>

        <!-- AI Predictions Card -->
        <div class="card">
            <h2>🤖 AI Predictions</h2>
            <div id="predictions-container" class="empty">No predictions available</div>
        </div>

        <!-- Emergency Alerts Card -->
        <div class="card">
            <h2>🚨 Emergency Alerts</h2>
            <div id="emergencies-container" class="empty">No emergencies</div>
        </div>

        <!-- Test Messages -->
        <div class="card">
            <h2>📋 Test Log</h2>
            <div id="log-container"></div>
            <button class="btn-primary" onclick="clearLog()" style="width: 100%; margin-top: 10px;">Clear Log</button>
        </div>
    </div>

    <!-- Include Scripts -->
    <script src="Auth.js"></script>
    <script src="LoggingHelper.js"></script>

    <script>
        // Test Log
        let testLog = [];

        function log(message, type = 'info') {
            const timestamp = new Date().toLocaleTimeString();
            testLog.unshift({ message, type, timestamp });
            updateLog();
            console.log(`[${type}] ${message}`);
        }

        function updateLog() {
            const container = document.getElementById('log-container');
            let html = '';
            testLog.slice(0, 10).forEach(entry => {
                html += `<div class="message message-${entry.type}"><strong>${entry.timestamp}</strong> - ${entry.message}</div>`;
            });
            container.innerHTML = html || '<div class="empty">No logs yet</div>';
        }

        function clearLog() {
            testLog = [];
            updateLog();
        }

        // Update Auth Status
        function updateAuthStatus() {
            const statusDiv = document.getElementById('auth-status');
            const isLoggedIn = Auth.isLoggedIn();
            const role = Auth.getRole();
            const user = Auth.getUser();

            let html = '';
            html += `<span class="status-badge ${isLoggedIn ? 'logged-in' : 'logged-out'}">
                Status: ${isLoggedIn ? '✅ Logged In' : '❌ Logged Out'}
            </span>`;

            if (isLoggedIn && role) {
                html += `<span class="status-badge role-${role}">Role: ${role.toUpperCase()}</span>`;
            }

            statusDiv.innerHTML = html;
        }

        function updateAuthInfo() {
            const container = document.getElementById('auth-info');
            const isLoggedIn = Auth.isLoggedIn();
            const user = Auth.getUser();

            let html = '';
            if (isLoggedIn && user) {
                html = `
                    <p><strong>Name:</strong> ${user.name}</p>
                    <p><strong>Role:</strong> ${Auth.getRole()}</p>
                    <p><strong>Mobile:</strong> ${user.mobile || user.contact || 'N/A'}</p>
                `;
            } else {
                html = '<p>Not logged in. Use buttons below to test.</p>';
            }

            container.innerHTML = html;
        }

        function updateStats() {
            if (!Auth.isLoggedIn()) {
                log('Please login first', 'warning');
                return;
            }

            const stats = Auth.getDashboardStats();
            const container = document.getElementById('stats-container');
            let html = '';

            Object.entries(stats).forEach(([key, value]) => {
                const label = key.replace(/([A-Z])/g, ' $1').trim().toUpperCase();
                html += `
                    <div class="stat">
                        <div class="stat-value">${value}</div>
                        <div class="stat-label">${label}</div>
                    </div>
                `;
            });

            container.innerHTML = html || '<div class="empty">No stats available</div>';
            log('Stats updated', 'success');
        }

        function displayPredictions() {
            if (!Auth.isLoggedIn()) return;

            const predictions = Auth.getAIPredictions();
            const container = document.getElementById('predictions-container');

            if (predictions.length === 0) {
                container.innerHTML = '<div class="empty">No predictions yet. Click "Log AI Prediction" to add one.</div>';
                return;
            }

            let html = `
                <table class="table">
                    <tr>
                        <th>Date</th>
                        <th>Disease</th>
                        <th>Severity</th>
                        <th>Confidence</th>
                    </tr>
            `;

            predictions.forEach(pred => {
                const date = new Date(pred.timestamp).toLocaleDateString();
                html += `
                    <tr>
                        <td>${date}</td>
                        <td>${pred.disease}</td>
                        <td>${pred.severity}</td>
                        <td>${(pred.confidence * 100).toFixed(0)}%</td>
                    </tr>
                `;
            });

            html += '</table>';
            container.innerHTML = html;
        }

        function displayEmergencies() {
            const emergencies = Auth.getEmergencyAlerts();
            const container = document.getElementById('emergencies-container');

            if (emergencies.length === 0) {
                container.innerHTML = '<div class="empty">No emergencies. Click "Log Emergency Alert" to add one.</div>';
                return;
            }

            let html = `
                <table class="table">
                    <tr>
                        <th>Date</th>
                        <th>Patient</th>
                        <th>Severity</th>
                        <th>Status</th>
                    </tr>
            `;

            emergencies.forEach(alert => {
                const date = new Date(alert.timestamp).toLocaleDateString();
                const badgeClass = alert.severity === 'Critical' ? 'critical' : alert.severity === 'High' ? 'high' : 'active';
                html += `
                    <tr>
                        <td>${date}</td>
                        <td>${alert.userName}</td>
                        <td><span class="badge badge-${badgeClass}">${alert.severity}</span></td>
                        <td><span class="badge badge-${alert.status}">${alert.status}</span></td>
                    </tr>
                `;
            });

            html += '</table>';
            container.innerHTML = html;
        }

        function logSamplePrediction() {
            if (!Auth.isLoggedIn()) {
                log('Please login first', 'warning');
                return;
            }

            const prediction = {
                disease: 'Type 2 Diabetes',
                severity: 'Medium',
                confidence: 0.87,
                symptoms: ['High Blood Sugar', 'Fatigue', 'Frequent Urination'],
                testResults: { bloodSugar: 185, hba1c: 7.1, bmi: 28 },
                recommendation: 'Consult endocrinologist, monitor diet',
                modelVersion: 'v2.1'
            };

            Auth.logAIPrediction(prediction);
            log(`AI Prediction logged: ${prediction.disease}`, 'success');
            updateStats();
            displayPredictions();
        }

        function logSampleEmergency() {
            if (!Auth.isLoggedIn()) {
                log('Please login first', 'warning');
                return;
            }

            const alert = {
                severity: 'Critical',
                message: 'Severe chest pain with rapid heartbeat',
                location: 'Home - Downtown',
                symptoms: ['Chest Pain', 'Shortness of Breath', 'Dizziness'],
                vitals: { heartRate: 125, bloodPressure: '180/110', oxygen: 89 },
                contactDoctor: true,
                ambulanceRequired: true,
                notes: 'Pain started suddenly 10 minutes ago'
            };

            Auth.logEmergencyAlert(alert);
            log('Emergency alert logged: Critical', 'success');
            updateStats();
            displayEmergencies();
        }

        function simulatePatientLogin() {
            const patientData = {
                name: 'Rajesh Kumar',
                mobile: '9876543210',
                age: 35
            };

            Auth.login('patient', patientData);
            log('Patient login simulated', 'success');
            updateAuthStatus();
            updateAuthInfo();
            updateStats();
            displayPredictions();
            displayEmergencies();
        }

        function simulateDoctorLogin() {
            const doctorData = {
                name: 'Dr. Priya Sharma',
                doctorId: 'DOC-2024-001',
                contact: 'priya@hospital.com',
                specialisation: 'Cardiology'
            };

            Auth.login('doctor', doctorData);
            log('Doctor login simulated', 'success');
            updateAuthStatus();
            updateAuthInfo();
            updateStats();
        }

        function simulatePatientRegister() {
            const patientData = {
                name: 'Ananya Singh',
                mobile: '9123456789',
                age: 28,
                password: 'safepass123'
            };

            Auth.register('patient', patientData);
            log('Patient registration simulated', 'success');
            updateAuthStatus();
            updateAuthInfo();
            updateStats();
        }

        // Initialize on load
        document.addEventListener('DOMContentLoaded', () => {
            log('Dashboard initialized', 'info');
            updateAuthStatus();
            updateAuthInfo();

            if (Auth.isLoggedIn()) {
                updateStats();
                displayPredictions();
                displayEmergencies();
            }
        });
    </script>
</body>
</html>
